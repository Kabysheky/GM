    <style>
        :root {
            --accent: #00ff88;
            --bg: #080808;
            --surface: #121212;
            --text: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            width: 90%;
            max-width: 440px;
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 2px; /* Brutalist sharp edges */
            border-left: 4px solid var(--accent);
            box-shadow: 20px 20px 0px #000;
        }
        .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #666;
            margin-bottom: 1.5rem;
            display: block;
        }
        #content {
            font-size: 1.25rem;
            line-height: 1.7;
            font-weight: 400;
        }
        .highlight {
            color: var(--accent);
            font-weight: 700;
        }
        .btn {
            margin-top: 2.5rem;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px 20px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
        }
        .btn:hover {
            background: var(--accent);
            color: #000;
        }
    </style>
</head>
